name: "Deploy ArgoCD & Bootstrap GitOps"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to bootstrap (dev, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write # Required for Azure OIDC login
  contents: read # Required to check out repository manifests

jobs:
  bootstrap-gitops:
    name: "Install ArgoCD & App-of-Apps (${{ inputs.environment }})"
    runs-on: self-hosted # Run inside the VNet via the self-hosted runner to access private AKS
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS Credentials
        run: |
          echo "Connecting to private AKS cluster..."
          # Since AKS name/resource group incorporates environment prefix (ctmp3dev vs ctmp3), look it up dynamically
          if [ "${{ inputs.environment }}" = "dev" ]; then
            RG_NAME="rg-ctmp3"
            AKS_NAME="ctmp3dev-aks"
          else
            RG_NAME="rg-ctmp3prod"
            AKS_NAME="ctmp3-aks"
          fi
          az aks get-credentials --resource-group "$RG_NAME" --name "$AKS_NAME" --overwrite-existing

      - name: Deploy App-of-Apps Bootstrap Manifest
        run: |
          echo "Applying ArgoCD App-of-Apps root bootstrap configuration for ${{ inputs.environment }}..."
          kubectl apply -f bootstrap/argocd-app-of-apps-${{ inputs.environment }}.yaml

          echo "Verifying root application creation..."
          kubectl get application -n argocd
